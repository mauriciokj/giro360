name: giro360_capture
description: Reusable ARKit video capture and OpenCV cylindrical panorama engine.
version: 0.0.1
homepage: https://github.com/mauriciokj/giro360
repository: https://github.com/mauriciokj/giro360
publish_to: "none"

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: Giro360CapturePlugin
